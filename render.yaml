services:
  - type: web
    name: isa-momentum-terminal
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:server --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SECRET_KEY
        generateValue: true
